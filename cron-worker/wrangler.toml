name = "all-news-cron"
main = "src/worker.js"
compatibility_date = "2024-11-01"

# Reliable hourly trigger (Cloudflare cron, unlike GitHub's best-effort schedule).
[triggers]
crons = ["*/30 * * * *"]

[vars]
OWNER = "k-blo"           # GitHub user/org
REPO = "all.news"         # TODO: set to the all.news GitHub repo (separate pipeline from swissnews)
WORKFLOW = "crawl.yml"    # workflow filename in .github/workflows/
REF = "main"              # branch to run on

# Secret (NOT here): set with `wrangler secret put GITHUB_TOKEN`
# Fine-grained PAT, repo = all.news, permission: Actions = Read and write.
