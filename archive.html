<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Browse the News Archive by Date – all.news</title>
  <meta name="description" content="Browse the all.news archive of past world news headlines by date. Every day's collected links from hundreds of global sources, in one place.">
  <link rel="canonical" href="https://all.news/archive.html">
  <meta property="og:title" content="Browse the News Archive by Date – all.news">
  <meta property="og:description" content="Browse the all.news archive of past world news headlines by date. Every day's collected links from hundreds of global sources, in one place.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://all.news/archive.html">
  <meta property="og:image" content="https://all.news/og-image.png">
  <meta name="robots" content="index, follow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192">
  <link rel="icon" href="/favicon-48.png" type="image/png" sizes="48x48">
  <link rel="apple-touch-icon" href="/favicon-192.png">
  <link rel="preload" href="/fonts/inter-latin-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/inter-latin-600.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/styles.css?v=5">
  <!-- Analytics placeholder: all.news runs its own analytics. Insert measurement tag here. -->
</head>
<body>
  <div class="container">
    <header class="topbar">
      <a href="/" class="brand-link">all.news</a>
      <nav class="topnav">
        <a href="/" class="nav-btn" style="text-decoration:none">
          Filter
          <span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h10"/><circle cx="17" cy="8" r="2.4"/><path d="M19.6 8H21"/><path d="M3 16h3"/><circle cx="9.5" cy="16" r="2.4"/><path d="M12.1 16H21"/></svg></span>
        </a>
        <a href="/" class="nav-btn" style="text-decoration:none">
          Menu
          <span class="icon" aria-hidden="true"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 9h17M3.5 15h17"/></svg></span>
        </a>
      </nav>
    </header>

    <main class="view">
      <div class="archive" id="archive"></div>
    </main>

    <footer class="site-footer">
      <span>© Copyright 2026 all.news</span>
      <span>all.news is not responsible for the content of external sites</span>
    </footer>
  </div>

  <script>
    const MONTHS = ["", "Januar", "Februar", "März", "April", "Mai", "Juni",
                    "Juli", "August", "September", "Oktober", "November", "Dezember"];
    const chev = '<svg class="chev" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>';

    function dayHeading(d) {
      const [y, m, day] = d.split("-");
      return `${+day}. ${MONTHS[+m]} ${y}`;
    }

    fetch("archive/index.json")
      .then((r) => r.json())
      .then((idx) => {
        const root = document.getElementById("archive");
        const dates = (idx.dates || []).slice().sort().reverse(); // newest first

        // Append the year to the month header only when the archive spans more
        // than one year, so a single year stays clean (just "August") while two
        // Augusts never collide.
        const multiYear = new Set(dates.map((d) => d.split("-")[0])).size > 1;

        // Group dates by year-month, preserving newest-first order.
        const groups = [];
        const byKey = {};
        for (const d of dates) {
          const [y, m] = d.split("-");
          const key = `${y}-${m}`;
          if (!byKey[key]) {
            byKey[key] = { label: multiYear ? `${MONTHS[+m]} ${y}` : MONTHS[+m], days: [] };
            groups.push(byKey[key]);
          }
          byKey[key].days.push(d);
        }

        if (!groups.length) {
          root.textContent = "archiv nicht verfügbar";
          return;
        }

        groups.forEach((g, i) => {
          const det = document.createElement("details");
          det.className = "archive-month";
          if (i === 0) det.open = true; // newest month expanded by default

          const sum = document.createElement("summary");
          sum.className = "month-head";
          sum.innerHTML = `<span>${g.label}</span>${chev}`;
          det.appendChild(sum);

          const days = document.createElement("div");
          days.className = "month-days";
          for (const d of g.days) {
            const a = document.createElement("a");
            a.className = "day-row";
            a.href = `archive/${d}.html`;
            a.innerHTML = `<span>${dayHeading(d)}</span>${chev}`;
            days.appendChild(a);
          }
          det.appendChild(days);
          root.appendChild(det);
        });
      })
      .catch(() => {
        document.getElementById("archive").textContent = "archiv nicht verfügbar";
      });
  </script>
</body>
</html>
