<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>all.news – Archiv</title>
  <meta name="description" content="Archiv aller täglich gesammelten Schweizer Nachrichtenlinks von all.news.">
  <link rel="canonical" href="https://all.news/archive.html">
  <meta property="og:title" content="all.news – Archiv">
  <meta property="og:description" content="Archiv aller täglich gesammelten Schweizer Nachrichtenlinks von all.news.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://all.news/archive.html">
  <meta property="og:image" content="https://all.news/og-image.png">
  <meta name="robots" content="index, follow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192">
  <link rel="icon" href="/favicon-48.png" type="image/png" sizes="48x48">
  <link rel="apple-touch-icon" href="/favicon-192.png">
  <link rel="preload" href="/fonts/inter-latin-400.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/inter-latin-600.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/styles.css">
  <!-- Analytics placeholder: all.news runs its own analytics. Insert measurement tag here. -->
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div class="brand">
        <a href="/" class="brand-link">all.news</a>
      </div>
      <a href="/" class="more-btn" style="text-decoration:none">← zurück</a>
    </header>

    <main class="view">
      <h2 class="day-heading">Archiv</h2>
      <nav class="older-dates" id="list"></nav>
    </main>

    <footer class="site-footer">
      <span>© Copyright 2026 all.news</span>
      <span>all.news is not responsible for the content of external sites</span>
    </footer>
  </div>

  <script>
    const chev = '<svg class="chev" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>';
    const MONTHS = ["", "Jan.", "Feb.", "März", "Apr.", "Mai", "Juni", "Juli", "Aug.", "Sept.", "Okt.", "Nov.", "Dez."];
    function heading(d) {
      const [y, m, day] = d.split("-");
      return `${day}. ${MONTHS[+m]} ${y}`;
    }
    fetch("archive/index.json")
      .then((r) => r.json())
      .then((idx) => {
        const list = document.getElementById("list");
        for (const d of (idx.dates || [])) {
          const a = document.createElement("a");
          a.className = "day-row";
          a.href = `archive/${d}.html`;
          a.innerHTML = `<span>${heading(d)}</span>${chev}`;
          list.appendChild(a);
        }
      })
      .catch(() => {
        document.getElementById("list").textContent = "archiv nicht verfügbar";
      });
  </script>
</body>
</html>
