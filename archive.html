<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>all.news – Archiv</title>
  <meta name="description" content="Archiv aller täglich gesammelten Schweizer Nachrichtenlinks von all.news.">
  <link rel="canonical" href="https://all.news/archive.html">
  <meta property="og:title" content="all.news – Archiv">
  <meta property="og:description" content="Archiv aller täglich gesammelten Schweizer Nachrichtenlinks von all.news.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://all.news/archive.html">
  <meta property="og:image" content="https://all.news/og-image.png">
  <meta name="robots" content="index, follow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192">
  <link rel="icon" href="/favicon-48.png" type="image/png" sizes="48x48">
  <link rel="apple-touch-icon" href="/favicon-192.png">
  <link rel="stylesheet" href="styles.css">
  <!-- Analytics placeholder: all.news runs its own analytics. Insert measurement tag here. -->
</head>
<body>
  <h1><a href="index.html" style="text-decoration:none;color:inherit"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" style="height:0.85em;vertical-align:-0.1em"><rect width="320" height="320" fill="#FF0000"/><rect x="130" y="60" width="60" height="200" fill="white"/><rect x="60" y="130" width="200" height="60" fill="white"/></svg> all.news</a> — archiv</h1>
  <ul id="list"></ul>
  <script>
    fetch("archive/index.json")
      .then((r) => r.json())
      .then((idx) => {
        const list = document.getElementById("list");
        for (const d of (idx.dates || [])) {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = `archive/${d}.html`;
          a.textContent = d;
          li.appendChild(a);
          list.appendChild(li);
        }
      })
      .catch(() => {
        document.getElementById("list").textContent = "archiv nicht verfügbar";
      });
  </script>
</body>
</html>
