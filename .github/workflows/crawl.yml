name: crawl

on:
  # Triggered by the Cloudflare Worker cron (cron-worker/) via the GitHub API.
  workflow_dispatch: {}

permissions:
  contents: read          # no longer commits — outputs go to R2

concurrency:
  group: crawl
  cancel-in-progress: false

# R2 remote ("R2:") for rclone, configured from secrets. rclone `copy` is used
# everywhere (never `sync`) so existing archive days in R2 are never deleted.
env:
  RCLONE_CONFIG_R2_TYPE: s3
  RCLONE_CONFIG_R2_PROVIDER: Cloudflare
  RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  RCLONE_CONFIG_R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
  RCLONE_CONFIG_R2_REGION: auto
  # Object-scoped R2 tokens can't create buckets; without this rclone tries to
  # verify/create the bucket on first write and gets AccessDenied.
  RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
  R2_BUCKET: ${{ secrets.R2_BUCKET }}

jobs:
  # ---- Map: non-VPN sources, 3 parallel shards ----
  crawl-main:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash
      - name: Pull HTTP cache from R2
        run: mkdir -p archive && rclone copy "R2:$R2_BUCKET/archive/http_cache.json" archive/ || true
      - name: Crawl (main shard ${{ matrix.shard }}/3)
        run: python3 crawler.py --group main --shard ${{ matrix.shard }} --of 3 --out partial-main-${{ matrix.shard }}.json
      - uses: actions/upload-artifact@v4
        with:
          name: partial-main-${{ matrix.shard }}
          path: partial-main-${{ matrix.shard }}.json

  # ---- Map: CH Media behind the Swiss VPN ----
  crawl-vpn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash
      - name: Pull HTTP cache from R2
        run: mkdir -p archive && rclone copy "R2:$R2_BUCKET/archive/http_cache.json" archive/ || true
      - name: Connect VPN
        run: |
          sudo apt-get install -y -qq wireguard-tools
          printf '%s\n' "$WG_CONF" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          sudo sed -i '/^DNS/d' /etc/wireguard/wg0.conf
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          echo "Egress now: $(curl -sS --max-time 20 https://ipinfo.io/org)"
        env:
          WG_CONF: ${{ secrets.WG_CONF }}
      - name: Crawl (vpn group)
        run: python3 crawler.py --group vpn --out partial-vpn.json
      - name: Disconnect VPN
        if: always()
        run: sudo wg-quick down wg0 || true
      - uses: actions/upload-artifact@v4
        with:
          name: partial-vpn
          path: partial-vpn.json

  # ---- Reduce: merge partials, write outputs, upload to R2 ----
  reduce:
    needs: [crawl-main, crawl-vpn]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install rclone
        run: curl -fsSL https://rclone.org/install.sh | sudo bash
      - name: Pull state from R2
        run: |
          mkdir -p archive
          rclone copy "R2:$R2_BUCKET/crawled.json" . || true
          rclone copy "R2:$R2_BUCKET/archive/seen.json" archive/ || true
          rclone copy "R2:$R2_BUCKET/archive/http_cache.json" archive/ || true
          rclone copy "R2:$R2_BUCKET/archive/index.json" archive/ || true
      - uses: actions/download-artifact@v4
        with:
          path: partials
          pattern: partial-*
          merge-multiple: true
      - name: Reduce + write
        run: |
          if ls partials/*.json >/dev/null 2>&1; then
            python3 crawler.py --reduce partials/*.json
          else
            echo "no partials produced — nothing to reduce"; exit 0
          fi
      - name: Upload outputs to R2
        run: |
          rclone copy crawled.json "R2:$R2_BUCKET/" -v
          rclone copy index.html  "R2:$R2_BUCKET/" -v
          rclone copy sitemap.xml "R2:$R2_BUCKET/" -v
          # today's archive pages + JSON + state files (copy = never deletes old days)
          rclone copy archive "R2:$R2_BUCKET/archive" -v
      - name: Verify R2 contents
        run: |
          echo "Total objects in bucket: $(rclone ls "R2:$R2_BUCKET" | wc -l)"
          echo "--- root files ---"; rclone lsl "R2:$R2_BUCKET" --max-depth 1
          echo "--- today's archive objects ---"
          rclone lsl "R2:$R2_BUCKET/archive" | grep "$(TZ=Europe/Zurich date +%Y-%m-%d)" | head
