name: crawl

on:
  # Triggered by the Cloudflare Worker cron (cron-worker/) via the GitHub API —
  # GitHub's own schedule: is best-effort and drifts/skips under load.
  workflow_dispatch: {}
  # Optional safety net if the Worker ever fails (GitHub still best-effort):
  # schedule:
  #   - cron: "0 */6 * * *"

permissions:
  contents: write          # allow committing crawled.json

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # CH Media papers 403 datacenter ASNs (Azure = GitHub runners). A Surfshark
      # Swiss exit lands in an allowed ASN, so route the whole crawl through it.
      # WG_CONF secret = a Surfshark manual WireGuard config (Switzerland).
      - name: Connect VPN
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq wireguard-tools
          printf '%s\n' "$WG_CONF" | sudo tee /etc/wireguard/wg0.conf > /dev/null
          # Drop DNS= so wg-quick doesn't need resolvconf; runner DNS resolves fine.
          sudo sed -i '/^DNS/d' /etc/wireguard/wg0.conf
          sudo chmod 600 /etc/wireguard/wg0.conf
          sudo wg-quick up wg0
          echo "Egress now: $(curl -sS --max-time 20 https://ipinfo.io/org)"
        env:
          WG_CONF: ${{ secrets.WG_CONF }}

      - name: Crawl feeds
        run: python3 crawler.py   # stdlib only, no pip install

      - name: Disconnect VPN
        if: always()
        run: sudo wg-quick down wg0 || true

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crawled.json archive/ index.html colors.js sitemap.xml
          if ! git diff --cached --quiet; then
            git commit -m "chore: hourly crawl"
            git pull --rebase origin main
            git push
          else
            echo "no changes"
          fi
